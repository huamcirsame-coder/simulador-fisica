<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador - Fricción y Ángulo Crítico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    overflow:hidden;
    color:white;
}

/* FONDO */

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#2563eb55,transparent 35%),
    radial-gradient(circle at bottom right,#06b6d455,transparent 35%);
    z-index:-1;
}

/* PANTALLAS */

.pantalla{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.activa{
    display:flex;
}

/* MENU */

.titulo{
    font-size:40px;
    text-align:center;
    color:#60a5fa;
    margin-bottom:20px;
    width:90%;
    line-height:1.4;
}

.subtitulo{
    color:#cbd5e1;
    margin-bottom:40px;
    font-size:18px;
}

.botones{
    display:flex;
    flex-direction:column;
    gap:20px;
    width:420px;
}

.btn{
    padding:20px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#2563eb,#06b6d4);
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0px 0px 20px #3b82f6;
}

/* SIMULADOR */

.sim-container{
    width:95%;
    height:92vh;
    display:grid;
    grid-template-columns:1fr 1.4fr;
    gap:20px;
}

/* CARDS */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:25px;
    overflow:auto;
}

/* INPUTS */

label{
    display:block;
    margin-top:15px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:12px;
    background:#0f172a;
    color:white;
    font-size:16px;
}

input:focus{
    outline:none;
    border:2px solid #3b82f6;
}

/* BOTONES */

.btn-accion{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-accion:hover{
    transform:scale(1.03);
}

.btn-regresar{
    background:linear-gradient(90deg,#ef4444,#f97316);
}

/* RESULTADOS */

.resultado{
    margin-top:20px;
    background:#0f172a;
    border-left:5px solid #3b82f6;
    padding:20px;
    border-radius:15px;
    line-height:1.8;
    font-size:17px;
}

/* FORMULAS */

.formula{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-top:12px;
    color:#60a5fa;
    font-size:18px;
}

/* CANVAS */

canvas{
    width:100%;
    height:100%;
    background:linear-gradient(#0f172a,#1e293b);
    border-radius:20px;
    border:2px solid #334155;
}

@media(max-width:1000px){

    .sim-container{
        grid-template-columns:1fr;
    }

    .botones{
        width:90%;
    }

}

</style>
</head>

<body>

<!-- MENU -->

<div class="pantalla activa" id="menu">

    <h1 class="titulo">
        Coeficiente de Fricción y el Ángulo Crítico de Deslizamiento en Planos Inclinados
    </h1>

    <p class="subtitulo">
        Simulador Interactivo
    </p>

    <div class="botones">

        <button class="btn"
        onclick="abrirEjercicio(1)">
            🚚 Problema 1 - Rampa de Concreto
        </button>

        <button class="btn"
        onclick="abrirEjercicio(2)">
            ⛏️ Problema 2 - Faja Transportadora
        </button>

        <button class="btn"
        onclick="abrirEjercicio(3)">
            📦 Problema 3 - Almacén Automatizado
        </button>

    </div>

</div>

<!-- SIMULADOR -->

<div class="pantalla" id="simulador">

<div class="sim-container">

<!-- PANEL IZQUIERDO -->

<div class="card">

<h2 id="tituloEjercicio">
Ejercicio
</h2>

<label>Coeficiente de fricción (μs)</label>
<input type="number" id="mu" step="0.01">

<label>Masa (kg)</label>
<input type="number" id="masa">

<label>Gravedad (m/s²)</label>
<input type="number" id="gravedad" value="9.81">

<button class="btn-accion"
onclick="simular()">
▶ Ejecutar simulación
</button>

<button class="btn-accion"
onclick="subirBloque()">
⬆ Subir bloque
</button>

<button class="btn-accion"
onclick="bajarBloque()">
⬇ Bajar bloque
</button>

<button class="btn-accion btn-regresar"
onclick="volverMenu()">
⬅ Volver al menú
</button>

<div class="resultado" id="resultado">

Presiona <b>“Ejecutar simulación”</b> para mostrar la solución paso a paso.

</div>

</div>

<!-- PANEL DERECHO -->

<div class="card">

<canvas id="canvas" width="900" height="600"></canvas>

</div>

</div>

</div>

<script>

/* VARIABLES */

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let bloqueX = 520;
let bloqueY = 320;
let anguloGlobal = 20;

/* ABRIR EJERCICIO */

function abrirEjercicio(tipo){

    menu.classList.remove("activa");
    simulador.classList.add("activa");

    resultado.innerHTML =
    `Presiona <b>“Ejecutar simulación”</b> para mostrar la solución paso a paso.`;

    if(tipo == 1){

        tituloEjercicio.innerHTML =
        "🚚 Problema 1 - Rampa de Concreto";

        mu.value = 0.45;
        masa.value = 5000;

    }

    if(tipo == 2){

        tituloEjercicio.innerHTML =
        "⛏️ Problema 2 - Faja Transportadora";

        mu.value = 0.32;
        masa.value = 3000;

    }

    if(tipo == 3){

        tituloEjercicio.innerHTML =
        "📦 Problema 3 - Almacén Automatizado";

        mu.value = 0.21;
        masa.value = 1000;

    }

    dibujar();

}

/* VOLVER MENU */

function volverMenu(){

    simulador.classList.remove("activa");
    menu.classList.add("activa");

}

/* SIMULAR */

function simular(){

    let muValor = parseFloat(mu.value);

    let masaValor = parseFloat(masa.value);

    let gravedadValor = parseFloat(gravedad.value);

    let theta = Math.atan(muValor);

    let grados = theta * 180 / Math.PI;

    anguloGlobal = grados;

    let peso = masaValor * gravedadValor;

    let normal = peso * Math.cos(theta);

    let paralela = peso * Math.sin(theta);

    resultado.innerHTML = `

    <h2 style="color:#60a5fa;">
    SOLUCIÓN PASO A PASO
    </h2>

    <br>

    <b>1. Cálculo del peso:</b>

    <div class="formula">
    W = m × g
    </div>

    <div class="formula">
    W = ${masaValor} × ${gravedadValor}
    </div>

    <div class="formula">
    W = ${peso.toFixed(2)} N
    </div>

    <br>

    <b>2. Cálculo del ángulo crítico:</b>

    <div class="formula">
    θ = arctan(μs)
    </div>

    <div class="formula">
    θ = arctan(${muValor})
    </div>

    <div class="formula">
    θ = ${grados.toFixed(2)}°
    </div>

    <br>

    <b>3. Fuerza normal:</b>

    <div class="formula">
    Fn = W × cos(θ)
    </div>

    <div class="formula">
    Fn = ${peso.toFixed(2)} × cos(${grados.toFixed(2)}°)
    </div>

    <div class="formula">
    Fn = ${normal.toFixed(2)} N
    </div>

    <br>

    <b>4. Fuerza paralela:</b>

    <div class="formula">
    Fp = W × sin(θ)
    </div>

    <div class="formula">
    Fp = ${peso.toFixed(2)} × sin(${grados.toFixed(2)}°)
    </div>

    <div class="formula">
    Fp = ${paralela.toFixed(2)} N
    </div>

    <br>

    <h2 style="color:#22c55e;">
    RESULTADOS FINALES
    </h2>

    🔹 Peso:
    <b>${peso.toFixed(2)} N</b><br>

    🔹 Fuerza normal:
    <b>${normal.toFixed(2)} N</b><br>

    🔹 Fuerza paralela:
    <b>${paralela.toFixed(2)} N</b><br>

    🔹 Ángulo crítico:
    <b>${grados.toFixed(2)}°</b>

    `;

    dibujar();

}

/* SUBIR */

function subirBloque(){

    bloqueY -= 20;

    dibujar();

}

/* BAJAR */

function bajarBloque(){

    bloqueY += 20;

    dibujar();

}

/* DIBUJAR */

function dibujar(){

    ctx.clearRect(0,0,900,600);

    /* FONDO */

    let grad = ctx.createLinearGradient(0,0,0,600);

    grad.addColorStop(0,"#0f172a");
    grad.addColorStop(1,"#1e293b");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,900,600);

    /* TITULO */

    ctx.fillStyle = "#38bdf8";

    ctx.font = "bold 32px Poppins";

    ctx.fillText(
        "Ángulo Crítico de Deslizamiento",
        180,
        55
    );

    /* ANGULO ARRIBA */

    ctx.fillStyle = "#facc15";

    ctx.font = "bold 28px Poppins";

    ctx.fillText(
        anguloGlobal.toFixed(2) + "°",
        390,
        100
    );

    /* TRIANGULO */

    ctx.beginPath();

    ctx.moveTo(120,500);
    ctx.lineTo(760,500);
    ctx.lineTo(760,220);

    ctx.closePath();

    let plano =
    ctx.createLinearGradient(120,500,760,220);

    plano.addColorStop(0,"#64748b");
    plano.addColorStop(1,"#cbd5e1");

    ctx.fillStyle = plano;

    ctx.fill();

    ctx.strokeStyle = "#ffffff";

    ctx.lineWidth = 4;

    ctx.stroke();

    /* BLOQUE */

    ctx.save();

    ctx.translate(bloqueX,bloqueY);

    ctx.rotate(-anguloGlobal*Math.PI/180);

    let bloque =
    ctx.createLinearGradient(-45,-45,45,45);

    bloque.addColorStop(0,"#2563eb");
    bloque.addColorStop(1,"#38bdf8");

    ctx.fillStyle = bloque;

    ctx.shadowColor = "#38bdf8";

    ctx.shadowBlur = 20;

    ctx.fillRect(-45,-45,90,90);

    ctx.strokeStyle = "#ffffff";

    ctx.lineWidth = 3;

    ctx.strokeRect(-45,-45,90,90);

    ctx.restore();

    /* PESO */

    ctx.beginPath();

    ctx.moveTo(bloqueX,bloqueY);

    ctx.lineTo(bloqueX,bloqueY+120);

    ctx.strokeStyle = "#ef4444";

    ctx.lineWidth = 5;

    ctx.stroke();

    ctx.fillStyle = "#ef4444";

    ctx.font = "bold 20px Poppins";

    ctx.fillText(
        "Peso",
        bloqueX+10,
        bloqueY+115
    );

    /* NORMAL */

    ctx.beginPath();

    ctx.moveTo(bloqueX,bloqueY);

    ctx.lineTo(bloqueX-100,bloqueY-90);

    ctx.strokeStyle = "#22c55e";

    ctx.lineWidth = 5;

    ctx.stroke();

    ctx.fillStyle = "#22c55e";

    ctx.fillText(
        "Normal",
        bloqueX-170,
        bloqueY-95
    );

    /* FRICCION */

    ctx.beginPath();

    ctx.moveTo(bloqueX,bloqueY);

    ctx.lineTo(bloqueX+120,bloqueY-50);

    ctx.strokeStyle = "#facc15";

    ctx.lineWidth = 5;

    ctx.stroke();

    ctx.fillStyle = "#facc15";

    ctx.fillText(
        "Fricción",
        bloqueX+125,
        bloqueY-55
    );

    /* ANGULO ABAJO */

    ctx.beginPath();

    ctx.arc(
        120,
        500,
        70,
        -0.42,
        0,
        false
    );

    ctx.strokeStyle = "#38bdf8";

    ctx.lineWidth = 5;

    ctx.stroke();

    ctx.fillStyle = "#38bdf8";

    ctx.font = "bold 24px Poppins";

    ctx.fillText(
        anguloGlobal.toFixed(2) + "°",
        210,
        485
    );

    /* NOMBRE PROFESORA */

    ctx.fillStyle = "#ffffff";

    ctx.font = "18px Poppins";

    ctx.fillText(
        "Dra. Poma Nuñez, Patricia Isabel",
        560,
        575
    );

}

dibujar();

</script>

</body>
</html>
